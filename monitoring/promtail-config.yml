server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Strip leading slash from container name (e.g. /myapp → myapp)
      - source_labels: [__meta_docker_container_name]
        regex: '/(.*)'
        target_label: container_name
      - source_labels: [__meta_docker_container_log_stream]
        target_label: stream

    pipeline_stages:
      # Parse Docker json-file log wrapper (adds stream, attrs fields)
      - docker: {}

      # Extract fields from Pino JSON logs
      - json:
          expressions:
            level: level
            module: module
          source: output

      # Convert Pino numeric level to string (30→info, 40→warn, 50→error)
      - template:
          source: level
          template: >-
            {{ if eq .Value "10" }}trace
            {{ else if eq .Value "20" }}debug
            {{ else if eq .Value "30" }}info
            {{ else if eq .Value "40" }}warn
            {{ else if eq .Value "50" }}error
            {{ else if eq .Value "60" }}fatal
            {{ else }}{{ .Value }}{{ end }}

      # Promote to labels (only set if non-empty — non-Pino containers skip gracefully)
      - labels:
          level:
          module:
          container_name:
