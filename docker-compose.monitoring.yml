services:
  promtail:
    image: grafana/promtail:3.4.3
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

  loki:
    image: grafana/loki:3.4.3
    restart: always
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/config.yml:ro
      - ./docker_data/loki_data:/loki
    command: -config.file=/etc/loki/config.yml
    expose:
      - 3100

  prometheus:
    image: prom/prometheus:v3.4.1
    restart: always
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker_data/prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
    expose:
      - 9090

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.51.0
    restart: always
    privileged: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    expose:
      - 8080

  grafana:
    image: grafana/grafana:11.6.0
    restart: always
    ports:
      - "${GRAFANA_PORT:-3100}:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
      - ./docker_data/grafana_data:/var/lib/grafana
    depends_on:
      - loki
      - prometheus
